<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Productivity app</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Architects_Daughter&family=Fredoka:wght@300..700&display=swap" rel="stylesheet">   
        <link rel="stylesheet" href="main.css">

    </head>
    <body id="body">
        <h1 id="time">20:00</h1>
        <div id="timerStatus"></div>
        <div class="timerControls">
            <button id="start" onclick="startTimer()">Start</button>  
            <button id="pause" onclick="pauseTimer()">Pause</button>  
            <button id="reset" onclick="resetTimer()">Reset</button> 
        </div>
        <div class="kanaban">
            <section class="kanaban-column" id="todo-column">
                <h2>To Do</h2>
                <div class="task-list" ondragover="allowDrop(event)" ondrop="drop(event)">
                </div>
                <div class="addTask">
                    <input type="text" placeholder="+ Add card..." onkeydown="handleNewCard(event, 'todo-column')">
                </div>
            </section>
            <section class="kanaban-column" id="doing-column">
                <h2>Doing</h2>
                <div class="task-list" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
                <div class="addTask">
                    <input type="text" placeholder="+ Add card..." onkeydown="handleNewCard(event, 'doing-column')">
                </div>
            </section>
            <section class="kanaban-column" id="done-column">
                <h2>Done</h2>
                <div class="task-list" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
                <div class="addTask">
                    <input type="text" placeholder="+ Add card..." onkeydown="handleNewCard(event, 'done-column')">
                </div>
            </section>
        </div>
        <button id="settingsBtn" class="clearBtn" onclick="openSettings()"><img style="width: 10vw; max-width: 50px;" src="./res/gear.svg" alt="settings"></button>
        <div id="settingsDIV" class="settings hidden">
            <form onsubmit="handleSettings(event)">
                <label for="workTime">Work Time:</label>
                    <input value="25" min="0.1" step="any" name="workTime_S" id="workTime" type="number">
                <label for="breakTime">Break Time:</label>
                   <input value="5" min="0.1" step="any" name="breakTime_S" id="breakTime" type="number">
                <label for="doDiffrentBreaks">Enable short and long breaks:</label>
                    <input checked type="checkbox" name="doDiffrentBreaks_S" id="doDiffrentBreaks">
                <label for="startAfterR">Start timer when Reset is pressed?</label>
                    <input checked type="checkbox" name="startAfterR_S" id="startAfterR">
                <button type="submit">Save</button>
                <button id="resetBtn" type="button" onclick="resetSettings();">Reset</button>
                <button id="closeSettings-Btn" type="button" onclick="closeSettings()">&times;</button>
                <p>Made by <a href="github.com/sagrusea">sagrusea &hearts;</a></p>
            </form>
        </div>
    </body>
    <script src="scripts.js"></script>
</html>
