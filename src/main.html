<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Productivity app</title>
        <link rel="stylesheet" href="main.css">
    </head>
    <body id="body">
        <h1 id="time">20:00</h1>
        <div class="timerControls">
            <button id="start" onclick="startTimer()">Start</button>  
            <button id="pause" onclick="pauseTimer()">Pause</button>  
            <button id="reset" onclick="resetTimer()">Reset</button> 
        </div>
        <div id="timerStatus"> work / rest</div>
        <div class="kanaban">
            <section class="kanaban-column" id="todo-column">
                <h2>To Do</h2>
                <div class="task-list" ondragover="allowDrop(event)" ondrop="drop(event)">
                    <article class="task-card" draggable="true" ondragstart="drag(event)" id="task-1">
                        <p>Fix a Bug</p>
                    </article>
                </div>
            </section>
            <section class="kanaban-column" id="doing-column">
                <h2>Doing</h2>
                <div class="task-list" ondragover="allowDrop(event)" ondrop="drop(event)">
            </section>
            <section class="kanaban-column" id="done-column">
                <h2>Done</h2>
                <div class="task-list" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
            </section>
        </div>
        <button class="clearBtn" onclick="openSettings()"><img style="width: 10vw; max-width: 50px;" src="./res/gear.svg" alt="settings"></button>
        <div id="settingsDIV" class="settings hidden">
            <form onsubmit="handleSettings(event)">
                <label for="workTime">Work Time:</label>
                    <input value="25" id="workTime" type="number">
                <label for="breakTime">Break Time:</label>
                   <input value="5" id="breakTime" type="number">
                <label for="doDiffrentBreaks">Enable short and long breaks:</label>
                    <input checked type="checkbox" id="doDiffrentBreaks">
                <button type="submit">Save</button>
            </form>
        </div>
    </body>
    <script src="scripts.js"></script>
</html>
